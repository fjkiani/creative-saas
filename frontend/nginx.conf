server {
    listen 10000;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/ to the FastAPI backend
    location /api/ {
        resolver 8.8.8.8 valid=30s;
        set $backend "${BACKEND_URL}";
        proxy_pass $backend;
        proxy_set_header Host creative-pipeline-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Api-Key "${API_KEY}";
        proxy_ssl_server_name on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 15s;
        proxy_send_timeout 300s;
    }

    # Proxy /outputs/ to the FastAPI backend (generated asset images)
    # ^~ prevents regex locations (like the static cache rule) from matching first
    location ^~ /outputs/ {
        resolver 8.8.8.8 valid=30s;
        set $backend "${BACKEND_URL}";
        proxy_pass $backend;
        proxy_set_header Host creative-pipeline-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;
        proxy_connect_timeout 15s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS/CSS/fonts bundled by Vite — not proxied paths)
    location ~* \.(js|css|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
