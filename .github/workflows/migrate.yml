name: Run Supabase Migrations

on:
  workflow_dispatch:
    inputs:
      migration_type:
        description: 'Which migrations to run'
        required: true
        default: 'fresh'
        type: choice
        options:
          - fresh       # schema.sql + storage_bucket.sql (new DB)
          - upgrade     # migrate_v3_to_v4.sql only (existing v3 DB)
          - all         # schema.sql + storage_bucket.sql + migrate_v3_to_v4.sql

# ── Required GitHub Secrets ────────────────────────────────────────────────────
# SUPABASE_DB_PASSWORD  — from Supabase dashboard → Settings → Database → Database password
#                         (this is the postgres user password, NOT the service_role_key)
# ──────────────────────────────────────────────────────────────────────────────

env:
  SUPABASE_PROJECT_REF: cllqahmtyvdcbyyrouxx
  DB_HOST: db.cllqahmtyvdcbyyrouxx.supabase.co
  DB_USER: postgres
  DB_NAME: postgres
  DB_PORT: "5432"

jobs:
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: |
          sudo apt-get update -q
          sudo apt-get install -y postgresql-client -q
          psql --version

      - name: Test DB connection
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          psql -h "${{ env.DB_HOST }}" -U "${{ env.DB_USER }}" \
               -d "${{ env.DB_NAME }}" -p "${{ env.DB_PORT }}" \
               -c "SELECT version();" 2>&1 | head -5

      - name: Run schema.sql (fresh install)
        if: ${{ github.event.inputs.migration_type == 'fresh' || github.event.inputs.migration_type == 'all' }}
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Running schema.sql ==="
          psql -h "${{ env.DB_HOST }}" -U "${{ env.DB_USER }}" \
               -d "${{ env.DB_NAME }}" -p "${{ env.DB_PORT }}" \
               -f backend/db/schema.sql \
               --set ON_ERROR_STOP=off 2>&1
          echo "Done."

      - name: Run storage_bucket.sql
        if: ${{ github.event.inputs.migration_type == 'fresh' || github.event.inputs.migration_type == 'all' }}
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Running storage_bucket.sql ==="
          psql -h "${{ env.DB_HOST }}" -U "${{ env.DB_USER }}" \
               -d "${{ env.DB_NAME }}" -p "${{ env.DB_PORT }}" \
               -f backend/db/storage_bucket.sql \
               --set ON_ERROR_STOP=off 2>&1
          echo "Done."

      - name: Run migrate_v3_to_v4.sql (upgrade only)
        if: ${{ github.event.inputs.migration_type == 'upgrade' || github.event.inputs.migration_type == 'all' }}
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Running migrate_v3_to_v4.sql ==="
          psql -h "${{ env.DB_HOST }}" -U "${{ env.DB_USER }}" \
               -d "${{ env.DB_NAME }}" -p "${{ env.DB_PORT }}" \
               -f backend/db/migrate_v3_to_v4.sql \
               --set ON_ERROR_STOP=off 2>&1
          echo "Done."

      - name: Verify tables
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Tables in public schema ==="
          psql -h "${{ env.DB_HOST }}" -U "${{ env.DB_USER }}" \
               -d "${{ env.DB_NAME }}" -p "${{ env.DB_PORT }}" \
               -c "SELECT table_name FROM information_schema.tables WHERE table_schema='public' ORDER BY table_name;" 2>&1
          
          echo ""
          echo "=== Storage buckets ==="
          psql -h "${{ env.DB_HOST }}" -U "${{ env.DB_USER }}" \
               -d "${{ env.DB_NAME }}" -p "${{ env.DB_PORT }}" \
               -c "SELECT id, name, public FROM storage.buckets;" 2>&1
