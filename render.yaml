# Render deployment blueprint — Creative Automation Pipeline v3
services:
  - type: web
    name: creative-pipeline-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PIPELINE_API_KEY
        sync: false
      - key: IMAGE_PROVIDER
        value: gemini
      - key: LLM_PROVIDER
        value: gemini
      - key: STORAGE_BACKEND
        value: local
      - key: CORS_ORIGINS
        value: "*"
  - type: web
    name: creative-pipeline-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
