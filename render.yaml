# Render deployment blueprint — Creative Automation Pipeline v3
services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: creative-pipeline-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    envVars:
      # ── LLM / Image ──────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      - key: PIPELINE_API_KEY
        sync: false
      - key: IMAGE_PROVIDER
        value: gemini
      - key: LLM_PROVIDER
        value: gemini

      # ── Storage ───────────────────────────────────────────────────────────────
      - key: STORAGE_BACKEND
        value: supabase

      # ── Supabase ──────────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        value: https://cllqahmtyvdcbyyrouxx.supabase.co
      # anon key is public-safe (browser-facing JWT, no elevated privileges)
      - key: SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsbHFhaG10eXZkY2J5eXJvdXh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwODk2MTAsImV4cCI6MjA5MzY2NTYxMH0.4uAaGn8Hnm2vMp_2rOQHfBEe3jCwlWdz3MAtHs-S7BE
      # service_role key — set this manually in Render dashboard, never commit
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # ── CORS — allow frontend origin ──────────────────────────────────────────
      - key: CORS_ORIGINS
        value: "*"

  # ── Frontend (React/Vite → nginx) ────────────────────────────────────────────
  - type: web
    name: creative-pipeline-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    buildArgs:
      # Baked into the Vite bundle at build time (anon key is public-safe)
      - key: VITE_SUPABASE_URL
        value: https://cllqahmtyvdcbyyrouxx.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsbHFhaG10eXZkY2J5eXJvdXh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwODk2MTAsImV4cCI6MjA5MzY2NTYxMH0.4uAaGn8Hnm2vMp_2rOQHfBEe3jCwlWdz3MAtHs-S7BE
    envVars:
      # Runtime nginx substitution — points to the backend service
      - key: BACKEND_URL
        value: https://creative-pipeline-backend.onrender.com
      - key: API_KEY
        sync: false
