# Render deployment blueprint — CreativeOS v4 (creative-saas)
# Providers: OpenRouter (free LLMs) + Modal (HunyuanImage + Wan2.2 video)
services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: creative-saas-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    envVars:
      # ── Auth ─────────────────────────────────────────────────────────────────
      - key: PIPELINE_API_KEY
        sync: false

      # ── LLM: OpenRouter (free models, fallback chain) ─────────────────────────
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: nvidia/nemotron-nano-9b-v2
      # Fallback chain (comma-separated, tried in order if primary is rate-limited)
      - key: OPENROUTER_FALLBACK_MODELS
        value: "deepseek/deepseek-v4-flash,google/gemma-4-26b-a4b,qwen/qwen3-coder-480b-a35b,meta-llama/llama-3.3-70b-instruct"

      # ── Gemini (fallback for image reference editing) ─────────────────────────
      - key: GEMINI_API_KEY
        sync: false

      # ── Image Generation: Modal (HunyuanImage-3.0) ───────────────────────────
      - key: IMAGE_PROVIDER
        value: modal
      - key: MODAL_IMAGE_ENDPOINT
        sync: false          # Set after: modal deploy modal_apps/image_gen.py
      - key: MODAL_KEY_ID
        value: wk-SsYrBKhwaRvX2KVEDCELoZ
      - key: MODAL_KEY_SECRET
        sync: false          # ws-ei5dSk2n5gcdYNRWtBSdY9

      # ── Video Generation: Modal (Wan2.2-T2V-A14B) ────────────────────────────
      - key: VIDEO_PROVIDER
        value: modal
      - key: MODAL_VIDEO_ENDPOINT
        sync: false          # Set after: modal deploy modal_apps/video_gen.py

      # ── Storage ───────────────────────────────────────────────────────────────
      - key: STORAGE_BACKEND
        value: supabase

      # ── Supabase ──────────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        value: https://cllqahmtyvdcbyyrouxx.supabase.co
      - key: SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsbHFhaG10eXZkY2J5eXJvdXh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwODk2MTAsImV4cCI6MjA5MzY2NTYxMH0.4uAaGn8Hnm2vMp_2rOQHfBEe3jCwlWdz3MAtHs-S7BE
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # ── Social Publishing ─────────────────────────────────────────────────────
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        sync: false
      - key: TIKTOK_ACCESS_TOKEN
        sync: false
      - key: TIKTOK_OPEN_ID
        sync: false

      # ── Competitor Analysis ───────────────────────────────────────────────────
      - key: APIFY_API_TOKEN
        sync: false

      # ── Billing (Stripe) ──────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID_PRO
        sync: false
      - key: STRIPE_PRICE_ID_ENTERPRISE
        sync: false

      # ── CORS ──────────────────────────────────────────────────────────────────
      - key: CORS_ORIGINS
        value: "*"

  # ── Frontend (React/Vite → nginx) ────────────────────────────────────────────
  - type: web
    name: creative-saas-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    buildArgs:
      - key: VITE_SUPABASE_URL
        value: https://cllqahmtyvdcbyyrouxx.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsbHFhaG10eXZkY2J5eXJvdXh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwODk2MTAsImV4cCI6MjA5MzY2NTYxMH0.4uAaGn8Hnm2vMp_2rOQHfBEe3jCwlWdz3MAtHs-S7BE
      - key: VITE_API_URL
        value: ""
      - key: VITE_API_KEY
        sync: false
    envVars:
      - key: BACKEND_URL
        value: https://creative-saas-backend.onrender.com
      - key: API_KEY
        sync: false
